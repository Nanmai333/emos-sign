name: "Emos 自动签到 (修仙版)"
description: "自动捕获 emos.best 凭证并执行每日修仙签到。支持通过 UI 修改 Cron 定时。"
author: "Nanmai333"
icon: "leaf.fill"

# ================= UI 配置界面 =================
env_schema:
  CAPTURE_ENABLED:
    name: "账号抓取 - 启用"
    description: "关闭后将停止捕获 emos.best 的登录凭证"
    options:
      - "true"
      - "false"
    default_value: "true"

  TASK_ENABLED:
    name: "签到任务 - 总开关"
    description: "关闭后定时签到脚本将不执行任何操作"
    options:
      - "true"
      - "false"
    default_value: "true"

  SIGN_CONTENT:
    name: "签到感悟"
    description: "设置每次签到时发送的文案"
    default_value: "滴滴打卡，开始修仙"

  # 这里的 ID 必须对应下方 schedule 里的引用
  SIGN_CRON:
    name: "签到时间 (Cron)"
    description: "在此填写 Cron 表达式（例如 20 8,20 * * *）"
    default_value: "20 8,20 * * *"

# ================= 域名解密 =================
mitm:
  hostnames:
    - "emos.best"

# ================= 数据抓取 =================
http_captures:
  - "emos.best"

# ================= 脚本配置 =================
scriptings:
  - http_request:
      name: "Emos 账号抓取"
      match: "^https://emos\\.best/api/user"
      script_url: "https://raw.githubusercontent.com/Nanmai333/Emos-Sign/refs/heads/main/emos.js"
      timeout: 10

  - schedule:
      name: "Emos 每日修仙任务"
      # 正确的动态引用方式：使用 ${{ }} 或从环境变量中映射
      # 注意：在 Egern UI 修改此值后，需要重启模块以重新注册定时器
      cron: "${{SIGN_CRON}}"
      script_url: "https://raw.githubusercontent.com/Nanmai333/Emos-Sign/refs/heads/main/emos.js"
      timeout: 120
      
